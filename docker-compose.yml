x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

services:
  db:
    platform: linux/amd64
    build: ./ApexGPS/db
    volumes:
      - pgdata:/var/lib/postgresql
      - ./ApexGPS/dem_data:/dem_data
      - ./ApexGPS/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  web:
    platform: linux/amd64
    build: ./ApexGPS
    volumes:
      - ./ApexGPS/dem_data:/dem_data
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Django
      DJANGO_SETTINGS_MODULE: apexgps.settings
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      # Your custom variables
      OSM_URL: ${OSM_URL}
      OSM_URL_KUMI: ${OSM_URL_KUMI}
      OSM_URL_NCHC: ${OSM_URL_NCHC}
      OSM_URL_CH: ${OSM_URL_CH}
      LOCAL_PATH1: ${LOCAL_PATH1}
      LOCAL_PATH2: ${LOCAL_PATH2}
      REACT_SERVER: ${REACT_SERVER}
      INIT_AREA: italy
      NOMINATIM_URL: ${NOMINATIM_URL}
      PYTHONMALLOC: malloc
      MALLOC_ARENA_MAX: 2
      WIKIMEDIA_API_URL: ${WIKIMEDIA_API_URL}
      WIKIPEDIA_API_URL: ${WIKIPEDIA_API_URL}
      PIC4CARTO_API_URL: ${PIC4CARTO_API_URL}
      API_USER_AGENT: ${API_USER_AGENT}
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py load_operational_dataset --verbose &&
        gunicorn --bind 0.0.0.0:8000 apexgps.wsgi:application
      "
    restart: unless-stopped
    networks:
      - private
    labels:
      - "traefik.enable=true"
      # Router for the API subdomain
      - "traefik.http.routers.backend.rule=Host(`api.apexgps.qzz.io`)"
      - "traefik.http.routers.backend.entrypoints=https"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=le"
      # Apply the standard middleware chain (defined in config.yaml)
      - "traefik.http.routers.backend.middlewares=standard@file"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./ApexGPS_Web
      args:
        # Pass any build-time variables your React app needs (e.g., REACT_APP_API_URL)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_OSM_API_URL: ${VITE_OSM_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_OAUTH2_SECRET: ${VITE_GOOGLE_OAUTH2_SECRET}
    networks:
      - private
    labels:
      - "traefik.enable=true"
      # Router for the main domain (and www)
      - "traefik.http.routers.frontend.rule=Host(`apexgps.qzz.io`) || Host(`www.apexgps.qzz.io`)"
      - "traefik.http.routers.frontend.entrypoints=https"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      # Apply the same standard middleware chain
      - "traefik.http.routers.frontend.middlewares=standard@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    restart: unless-stopped

  proxy:
    image: traefik:v3.6@sha256:c549d482c55d7a797398562064f35428cc53e748d84d7190997930e7b31bcc32
    networks:
      - shared
      - private
      - public
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - docker-socket
    restart: unless-stopped
    privileged: true
    tty: true
    volumes:
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./config.yaml:/etc/traefik/config.yaml:ro
      - letsencrypt:/letsencrypt
    <<: *logging

  docker-socket:
    image: ghcr.io/tecnativa/docker-socket-proxy:nightly@sha256:58b68cb4fe9a6f1a34f8996d65bc501797b9b2a6f1fdb778004d145bc7be1ab0
    privileged: true
    restart: unless-stopped
    networks:
      - private
      - shared   # so Traefik can reach it via the shared network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      SWARM: 1
      TASKS: 1
    <<: *logging

networks:
  shared:
    internal: true
    name: proxy_shared
    driver_opts:
      encrypted: 1
  private:
    internal: true
    driver_opts:
      encrypted: 1
  public:

volumes:
  pgdata:
  media_volume:
  letsencrypt: